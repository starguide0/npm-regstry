name: Changeset Version Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.changeset/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Update Versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # NODE_AUTH_TOKEN 환경 변수 추가

      - name: Get PR Number
        id: pr_number
        run: |
          # Extract PR number from commit message (format: "Merge pull request #123 from...")
          PR_NUM=$(git log -1 --pretty=format:"%s" | grep -o '#[0-9]\+' | head -1 | sed 's/#//')
          if [ -z "$PR_NUM" ]; then
            # If no PR number found in commit message, try to find associated PR via GitHub API
            COMMIT_SHA="${{ github.sha }}"
            PR_NUM=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls" | \
              jq -r '.[0].number // empty')
          fi
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT
          echo "Found PR number: ${PR_NUM}"

      - name: Warn - Auto Changesets skipped
        if: ${{ !steps.pr_number.outputs.pr_number }}
        run: |
          echo "::warning::Auto changeset generation skipped: No PR number detected for commit ${{ github.sha }} on branch ${{ github.ref_name }}."

      - name: Generate Auto Changesets
        if: ${{ steps.pr_number.outputs.pr_number }}
        run: |
          TARGET_BRANCH="${{ github.ref_name }}"
          pnpm changeset:auto "https://github.com/${{ github.repository }}/pull/${{ steps.pr_number.outputs.pr_number }}" "$TARGET_BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Changeset Version
        run: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Changes
        id: changes
        run: |
          git_status_output=$(git status --porcelain)
          if [[ -n "$git_status_output" ]]; then
            echo "changes_exist=true" >> $GITHUB_OUTPUT
          else
            echo "changes_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Aggregate Commit Messages from Merged Branch
        if: steps.changes.outputs.changes_exist == 'true'
        id: commit_info
        run: |
          if [ $(git cat-file -p HEAD | grep -c "^parent") -eq 2 ]; then
            echo "✅ Merge commit detected. Aggregating messages from the branch."

            # 원본 머지 커밋 메시지를 가져옵니다. (예: "Merge pull request #123 from feature/login")
            MERGE_MSG_TITLE=$(git log -1 --pretty=%s)

            # 머지된 브랜치에만 포함된 커밋 목록을 생성합니다.
            # HEAD^1: main 브랜치의 이전 커밋
            # HEAD^2: 머지된 기능 브랜치의 마지막 커밋
            COMMIT_LOGS=$(git log HEAD^2 --not HEAD^1 --pretty="format:- %s")

            # 최종 커밋 메시지를 조합합니다.
            FINAL_MSG=$(cat <<EOF
${MERGE_MSG_TITLE}

ci: Version packages and update changelogs

Changes included in this release:
${COMMIT_LOGS}
EOF
)
          else
            echo "⏩ Non-merge commit detected. Using the commit message directly."
            # 머지 커밋이 아닌 경우 (예: main에 직접 커밋), 해당 커밋 메시지를 그대로 사용합니다.
            COMMIT_MSG=$(git log -1 --pretty=%s)
            FINAL_MSG=$(cat <<EOF
${COMMIT_MSG}

ci: Version packages and update changelogs
EOF
)
          fi
  
          # 여러 줄의 커밋 메시지를 다음 단계로 안전하게 전달합니다.
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$FINAL_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Commit Version Changes
        if: steps.changes.outputs.changes_exist == 'true'
        env:
          COMMIT_MESSAGE: ${{ steps.commit_info.outputs.message }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .
          # 이전 단계에서 생성한 동적인 커밋 메시지를 사용합니다.
          git commit -m "$COMMIT_MESSAGE"

          git push origin HEAD:main
