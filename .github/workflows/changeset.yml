name: Changeset Version Update

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.changeset/**'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  version:
    name: Update Versions
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js and pnpm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # NODE_AUTH_TOKEN 환경 변수 추가

      - name: Get PR Number
        id: pr_number
        run: |
          # Extract PR number from commit message (format: "Merge pull request #123 from...")
          PR_NUM=$(git log -1 --pretty=format:"%s" | grep -o '#[0-9]\+' | head -1 | sed 's/#//')
          if [ -z "$PR_NUM" ]; then
            # If no PR number found in commit message, try to find associated PR via GitHub API
            COMMIT_SHA="${{ github.sha }}"
            PR_NUM=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/commits/$COMMIT_SHA/pulls" | \
              jq -r '.[0].number // empty')
          fi
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT
          echo "Found PR number: ${PR_NUM}"

      - name: Generate Auto Changesets
        run: |
          if [ -n "${{ steps.pr_number.outputs.pr_number }}" ]; then
            pnpm changeset:auto "https://github.com/${{ github.repository }}/pull/${{ steps.pr_number.outputs.pr_number }}"
          else
            pnpm changeset:auto
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Changeset Version
        run: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Changes
        id: changes
        run: |
          git_status_output=$(git status --porcelain)
          if [[ -n "$git_status_output" ]]; then
            echo "changes_exist=true" >> $GITHUB_OUTPUT
          else
            echo "changes_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit Version Changes
        if: steps.changes.outputs.changes_exist == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add .
          git commit -m "Version: Update package.json and changelogs"
          
          git push origin HEAD:main
